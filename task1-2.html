<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <script>
    let radius=Number(prompt("enter the radius of circle"));
    let area=3.14*radius**2;
    console.log(`the area of circle with radius ${radius} is = ${area}`);
    let semicircle_area=0.5*3.14*radius**2;
    console.log(`the area of semicircle with radius ${radius} is = ${semicircle_area}`);
    let circumference=2*3.14*radius;
    console.log(`the circumference of circle with radius ${radius} is = ${circumference}`);
  </script>
</body>
</html>
