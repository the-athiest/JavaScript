<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=Number(prompt("enter value of a "));
        let b=Number(prompt("enter value of b "));
        let c=a**2+b**2-2*a*b;
        console.log(`the value of (${a}-${b})² is = ${c}`);  
        let d=a**2+b**2+2*a*b;
        console.log(`the value of (${a}+${b})² is = ${d}`);
    </script>
</body>
</html>
