<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = Number(prompt("Enter a number"));
        console.log(`Multiplication table of ${a}`);
        for (let i = 1; i <= 10; i++) {
            console.log(`${i} x ${a} = ${a * i}`);
        }
    </script>
</body>
</html>
